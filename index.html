<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F172A" />
    <meta name="author" content="Psychic Charan" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <!-- Preload LCP Image -->
    <link rel="preload" as="image" href="/images/Psychic%20Charan%20Bn%20-%202.webp" fetchpriority="high" />

    <meta name="application-name" content="Psychic Charan" />
    <meta name="apple-mobile-web-app-title" content="Psychic Charan" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Non-blocking Google Fonts using Script Injection to avoid Vite's auto-blocking -->
    <script>
      (function() {
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,600;0,6..96,700;1,6..96,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap';
        document.head.appendChild(link);
      })();
    </script>
  </head>

  <body>
    <div id="root">
      <!-- Static Pre-render of Hero Section (FCP & LCP trigger instantly before JS loads) -->
      <style>
        body, html { margin: 0; padding: 0; background-color: #FEF7F9; font-family: sans-serif; }
        .hero-static {
          min-height: 90vh;
          display: flex;
          align-items: center;
          padding: 1rem;
          box-sizing: border-box;
        }
        .hero-content {
          text-align: center;
          width: 100%;
        }
        .hero-h1 {
          font-size: 4.5rem;
          margin-top: 2.5rem;
          margin-bottom: 2rem;
          line-height: 1.2;
          font-family: serif;
          font-style: italic;
          color: #1591DC;
        }
        .hero-subtitle {
          font-size: 1.25rem;
          color: #333;
          max-width: 600px;
          margin: 0 auto 2rem auto;
          line-height: 1.6;
        }
      </style>
      <div class="hero-static">
        <div class="hero-content">
          <h1 class="hero-h1">Expert <br/> <span style="background: linear-gradient(135deg, #1591DC 0%, #2C5EAD 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Psychic Reading</span></h1>
          <p class="hero-subtitle">Experience immediate, guaranteed relationship restoration. We utilize powerful spiritual alignments to bring back lost love and heal broken bonds within a single day.</p>
          <div style="display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap;">
            <div style="padding: 1rem 2rem; background: #1591DC; color: white; border-radius: 50px; font-weight: bold;">Explore Services</div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
